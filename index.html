<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApneApp | Navigation</title>
    <style>
        body {
            background-color: #0f1715; /* Dark greenish-black to match your vibe */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #00ffa3; letter-spacing: 2px; text-transform: uppercase; }
        .container {
            background: #1a2321;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .btn {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 20px 0;
            background: transparent;
            color: #00ffa3;
            border: 2px solid #00ffa3;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #00ffa3;
            color: #0f1715;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 163, 0.3);
        }
        p { opacity: 0.7; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ApneApp</h1>
        <p>Seleccioná tu entrenamiento / Select your training:</p>
        
        <a href="Breathwork.html" class="btn">BREATHWORK DASHBOARD</a>
        <a href="apnea.html" class="btn">APNEA TRAINER</a>

        <p style="margin-top: 30px;">Created by Sofia Renata</p>
    </div>

    <style>
    body {
        background-color: #0f1715;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    h1 { color: #00ffa3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .container {
        background: #1a2321;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        text-align: center;
        display: flex; /* Centers the buttons inside the card */
        flex-direction: column;
        align-items: center;
    }
    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 280px; /* Fixed width makes them symmetrical */
        height: 60px;  /* Fixed height for uniformity */
        margin: 12px 0;
        background: transparent;
        color: #00ffa3;
        border: 2px solid #00ffa3;
        text-decoration: none;
        border-radius: 14px;
        font-weight: bold;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box; /* Ensures padding doesn't mess up width */
    }
    .btn:hover {
        background: #00ffa3;
        color: #0f1715;
        transform: scale(1.02);
        box-shadow: 0 0 15px rgba(0, 255, 163, 0.4);
    }
    p { opacity: 0.7; font-size: 0.9em; margin-bottom: 20px; }
    .footer { margin-top: 30px; opacity: 0.5; font-size: 0.8em; }
</style>

</body>
</html>
